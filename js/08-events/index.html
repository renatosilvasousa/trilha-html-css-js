<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="events.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Eventos em JS</title>
</head>
<body>
    <h1 id="my-title">Eventos em JS</h1>
    <button id="my-button">Clica em mim!</button>
    <h2>Removendo eventos</h2>
    <button id="my-button2">Adiciona evento</button>
    <button id="my-button3">Remove o evento</button>
    <h2>Propagação de eventos</h2>
    <div id="btn-container">
        <button id="btn-indiv">Estou dentro da div com um evento.</button>
    </div>
    <h2>Prevent Default</h2>
    <a href="https://google.com" id="deflink">Esse link está desabilitado pelo JS</a>
    <h2>Eventos de Mouse</h2>
    <div id="mousearea">
        <h3 id="mousearea-label">Essa área detecta os cliques do seu mouse!</h3>
    </div>
    <h2>Evento de Focus e Blur</h2>
    <input type="text" id="my-input" placeholder="Testando...">
</body>
</html>
